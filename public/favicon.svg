<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200" fill="none">
    <!-- 背景方形，圆角20px -->
    <rect x="0" y="0" width="200" height="200" rx="20" ry="20" fill="white"/>

    <!-- 书本图标 -->
    <path d="M50 50H150V150H50V50Z" fill="#4A90E2"/>
    <!-- 书脊 -->
    <path d="M50 50V150" stroke="#357ABD" stroke-width="10"/>
    <!-- 书页 -->
    <path d="M50 50L45 55M50 75L45 80M50 100L45 105M50 125L45 130M50 150L45 155" stroke="#357ABD" stroke-width="5"
          stroke-linecap="round"/>
    <!-- 书本标题线 -->
    <path d="M75 75H125" stroke="white" stroke-width="5"/>
    <path d="M75 100H115" stroke="white" stroke-width="5"/>
    <path d="M75 125H105" stroke="white" stroke-width="5"/>
</svg>